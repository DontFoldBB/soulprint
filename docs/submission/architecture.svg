<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5b93de"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10 Z" fill="#5b93de"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#0a0a0c"/>

  <!-- Title -->
  <text x="80" y="80" font-size="32" font-weight="bold" fill="#ffffff">Soulprint — Architecture</text>
  <text x="80" y="115" font-size="16" fill="#71717a">A two-step on-chain agent pipeline with a cost-gate in the middle, and an autonomy loop above.</text>

  <!-- Eyebrow -->
  <text x="80" y="45" font-size="11" font-weight="bold" fill="#ffffff" letter-spacing="3">SOULPRINT</text>
  <text x="200" y="45" font-size="11" fill="#71717a" letter-spacing="3">·   Encode × Somnia Agentathon</text>

  <!-- Outer panel: pipeline -->
  <rect x="80" y="180" width="1440" height="320" rx="14" fill="#16181d" stroke="#27272a" stroke-width="1"/>
  <text x="105" y="215" font-size="11" font-weight="bold" fill="#5b93de" letter-spacing="3">PIPELINE  (mint + re-evolution)</text>

  <!-- ── User / Agent ── -->
  <g transform="translate(125, 260)">
    <rect width="220" height="100" rx="10" fill="#0a0a0c" stroke="#5b93de" stroke-width="1.25"/>
    <text x="110" y="32" font-size="11" font-weight="bold" fill="#5b93de" text-anchor="middle" letter-spacing="2">USER OR AGENT</text>
    <text x="110" y="60" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">read(wallet)</text>
    <text x="110" y="82" font-size="11" fill="#71717a" text-anchor="middle">payable · 1 STT self / 2 STT other</text>
  </g>

  <!-- ── JSON API agent ── -->
  <g transform="translate(395, 260)">
    <rect width="220" height="100" rx="10" fill="#0a0a0c" stroke="#27272a" stroke-width="1"/>
    <text x="110" y="32" font-size="11" font-weight="bold" fill="#71717a" text-anchor="middle" letter-spacing="2">SOMNIA AGENT</text>
    <text x="110" y="60" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">JSON API · tx_count</text>
    <text x="110" y="82" font-size="11" fill="#71717a" text-anchor="middle">3 validators · ~0.09 STT</text>
  </g>

  <!-- ── Cost gate ── -->
  <g transform="translate(665, 260)">
    <rect width="220" height="100" rx="10" fill="#0a0a0c" stroke="#f0b94e" stroke-width="1.25"/>
    <text x="110" y="32" font-size="11" font-weight="bold" fill="#f0b94e" text-anchor="middle" letter-spacing="2">COST-GATE</text>
    <text x="110" y="60" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">tx_count unchanged?</text>
    <text x="110" y="82" font-size="11" fill="#71717a" text-anchor="middle">→ skip · EvolutionSkipped</text>
  </g>
  <!-- + Fuel gate annotation -->
  <text x="775" y="395" font-size="10" fill="#f0b94e" text-anchor="middle" font-style="italic">also: evoBalance &gt;= EVOLUTION_COST?</text>
  <text x="775" y="412" font-size="10" fill="#71717a" text-anchor="middle">otherwise EvolutionPaused</text>

  <!-- ── LLM agent ── -->
  <g transform="translate(935, 260)">
    <rect width="220" height="100" rx="10" fill="#0a0a0c" stroke="#27272a" stroke-width="1"/>
    <text x="110" y="32" font-size="11" font-weight="bold" fill="#71717a" text-anchor="middle" letter-spacing="2">SOMNIA AGENT</text>
    <text x="110" y="60" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">LLM · Qwen-3 30B</text>
    <text x="110" y="82" font-size="11" fill="#71717a" text-anchor="middle">consensus-verified · ~0.21 STT</text>
  </g>

  <!-- ── Mint ── -->
  <g transform="translate(1205, 260)">
    <rect width="220" height="100" rx="10" fill="#0a0a0c" stroke="#5b93de" stroke-width="1.25"/>
    <text x="110" y="32" font-size="11" font-weight="bold" fill="#5b93de" text-anchor="middle" letter-spacing="2">SOULBOUND MINT</text>
    <text x="110" y="60" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">ERC-721 + ERC-5192</text>
    <text x="110" y="82" font-size="11" fill="#71717a" text-anchor="middle">dynamic on-chain tokenURI</text>
  </g>

  <!-- Arrows between boxes (y=310 middle) -->
  <line x1="345" y1="310" x2="395" y2="310" stroke="#5b93de" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="310" x2="665" y2="310" stroke="#5b93de" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="885" y1="310" x2="935" y2="310" stroke="#5b93de" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1155" y1="310" x2="1205" y2="310" stroke="#5b93de" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pipeline output annotation -->
  <text x="800" y="450" font-size="13" fill="#d1d5db" text-anchor="middle">
    handleStats() and handleDossier() are gated callbacks; every status (Success / Failed / TimedOut) handled.
  </text>
  <text x="800" y="472" font-size="13" fill="#d1d5db" text-anchor="middle">
    On success: dossier[id] = text, generation++, stageOf[id] = stage(tx_count), formIdOf[id] = lookup(archetype × stage)
  </text>

  <!-- ── Autonomy loop ── -->
  <rect x="80" y="540" width="1440" height="160" rx="14" fill="#16181d" stroke="#27272a" stroke-width="1"/>
  <text x="105" y="575" font-size="11" font-weight="bold" fill="#5b93de" letter-spacing="3">AUTONOMY  (criterion #4 — proven live)</text>

  <g transform="translate(125, 600)">
    <rect width="320" height="80" rx="10" fill="#0a0a0c" stroke="#5b93de" stroke-width="1.25"/>
    <text x="160" y="30" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">SoulprintCron</text>
    <text x="160" y="50" font-size="11" fill="#71717a" text-anchor="middle">Somnia Reactivity SomniaEventHandler</text>
    <text x="160" y="68" font-size="11" fill="#71717a" text-anchor="middle">0x0bf4…9d95  ·  30-min interval  ·  batch 5</text>
  </g>

  <text x="500" y="635" font-size="13" fill="#d1d5db">
    on tick: ticks++ → evolveBatch(N) → _scheduleNext() — same handler, no human tx
  </text>
  <text x="500" y="657" font-size="13" fill="#d1d5db">
    sender of every tick = Reactivity precompile 0x…0100. owner has zero outgoing tx to the cron.
  </text>
  <text x="500" y="679" font-size="12" fill="#f0b94e" font-style="italic">
    previous cron 0x3cad…4a6b reached 35 autonomous ticks → 2 real evolutions, 33 cost-gated skips.
  </text>

  <!-- Arrow from cron to evolveBatch (back up into pipeline) -->
  <line x1="445" y1="600" x2="775" y2="370" stroke="#5b93de" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="650" y="490" font-size="11" fill="#5b93de" font-style="italic" transform="rotate(-30 650 490)">evolveBatch()</text>

  <!-- ── Composability ── -->
  <rect x="80" y="740" width="1440" height="120" rx="14" fill="#16181d" stroke="#27272a" stroke-width="1"/>
  <text x="105" y="775" font-size="11" font-weight="bold" fill="#5b93de" letter-spacing="3">COMPOSABILITY  (criterion #2 — agent-first reads)</text>

  <g transform="translate(125, 795)">
    <rect width="380" height="50" rx="8" fill="#0a0a0c" stroke="#27272a" stroke-width="1"/>
    <text x="190" y="22" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">ONE-CALL READS</text>
    <text x="190" y="40" font-size="11" fill="#71717a" text-anchor="middle" font-family="Consolas, monospace">profileOf · traitsOf · evolutionOf · evolutionFuel</text>
  </g>

  <g transform="translate(535, 795)">
    <rect width="380" height="50" rx="8" fill="#0a0a0c" stroke="#27272a" stroke-width="1"/>
    <text x="190" y="22" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">MCP SERVER</text>
    <text x="190" y="40" font-size="11" fill="#71717a" text-anchor="middle" font-family="Consolas, monospace">mcp/ — get_soulprint(wallet)</text>
  </g>

  <g transform="translate(945, 795)">
    <rect width="380" height="50" rx="8" fill="#0a0a0c" stroke="#27272a" stroke-width="1"/>
    <text x="190" y="22" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">EXAMPLEGATE</text>
    <text x="190" y="40" font-size="11" fill="#71717a" text-anchor="middle" font-family="Consolas, monospace">ExampleGate.enter() — activityScore &gt;= N</text>
  </g>

  <text x="1380" y="826" font-size="11" fill="#71717a" text-anchor="end">github.com/DontFoldBB/soulprint</text>

  <!-- Footer accent -->
  <rect x="0" y="897" width="1600" height="3" fill="#5b93de"/>
</svg>
